version: '3.8'
services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgresql://postgres:password@postgres:5432/cybergate
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=supersecret-cybergate-key
      - ADMIN_EMAIL=admin@cybergate.local
      - ADMIN_PASSWORD=Admin@123456
      - GATEWAY_DOMAIN=localhost
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cybergate
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
